<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一一的数学错题挑战空间 🎯</title>
  <link rel="stylesheet" href="style.css">
  <!-- Import Outfit for English/numbers and Noto Sans SC for Chinese for premium typography -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Canvas for celebrating correct answers with confetti -->
  <canvas id="confetti-canvas"></canvas>

  <div class="app-container">
    <!-- 1. Welcome Screen -->
    <div id="welcome-screen" class="card active">
      <div class="emoji-banner">🏆</div>
      <h1>一一的数学错题挑战空间</h1>
      <p class="subtitle">在这里进行针对性练习，通过多变的题目真正掌握知识点！</p>
      
      <div class="start-form">
        <label for="student-name">输入挑战者姓名：</label>
        <input type="text" id="student-name" value="一一" placeholder="请输入姓名">
        
        <label for="challenge-mode">选择挑战模式：</label>
        <select id="challenge-mode" class="inline-select" style="width: 100%; margin-bottom: 8px;">
          <option value="all" selected>全量挑战模式 (练习所有 8 道错题)</option>
          <option value="smart">智能复习模式 (按记忆曲线自动出题)</option>
        </select>
        
        <button id="start-btn" class="btn btn-primary">进入挑战 🚀</button>
      </div>
    </div>

    <!-- 2. Quiz Workspace Screen -->
    <div id="quiz-screen" class="card">
      <div class="quiz-header">
        <div class="student-badge">👤 挑战者: <span id="display-name"></span></div>
        <div class="progress-info">
          <span>进度: <strong id="current-question-num">1</strong> / <span id="total-questions-num">8</span></span>
        </div>
      </div>
      
      <!-- Progress Bar -->
      <div class="progress-bar-container">
        <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
      </div>

      <!-- Question Card Container -->
      <div id="question-card" class="question-card">
        <!-- Rendered dynamically via app.js -->
      </div>

      <!-- Control buttons -->
      <div class="quiz-controls">
        <button id="submit-btn" class="btn btn-success">提交答案 📝</button>
        <button id="explanation-btn" class="btn btn-info hide">查看解析 💡</button>
        <button id="next-btn" class="btn btn-primary hide">下一题 ➡️</button>
      </div>

      <!-- Explanation Panel -->
      <div id="explanation-panel" class="explanation-panel hide">
        <h3>💡 错题解析</h3>
        <div id="explanation-content" class="explanation-content"></div>
      </div>
    </div>

    <!-- 3. Score Summary Screen -->
    <div id="summary-screen" class="card">
      <div class="emoji-banner" id="summary-emoji">🎉</div>
      <h2 id="summary-title">挑战完成！</h2>
      <p id="summary-text" class="subtitle">太棒了！让我们看看今天的收获吧：</p>

      <div class="stars-container" id="stars-container">
        <!-- Stars rendered dynamically -->
      </div>

      <div class="score-display">
        <div class="score-num"><span id="correct-count">0</span> / <span id="summary-total-questions">8</span></div>
        <div class="score-label">答对题数</div>
      </div>

      <!-- Detailed breakdown -->
      <div class="breakdown-list">
        <h3>📋 答题清单</h3>
        <div id="breakdown-items"></div>
      </div>

      <div class="summary-controls">
        <button id="restart-btn" class="btn btn-primary">换一批新数字，再挑战一次！ 🔄</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
